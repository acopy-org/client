name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install X11 dev libraries
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxfixes-dev
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath -ldflags="-s -w" -o acopy-linux-amd64 ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-linux-amd64
          path: acopy-linux-amd64

  build-darwin:
    strategy:
      matrix:
        include:
          - goarch: amd64
            artifact: acopy-darwin-amd64
          - goarch: arm64
            artifact: acopy-darwin-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-windows:
    strategy:
      matrix:
        include:
          - goarch: amd64
            artifact: acopy-windows-amd64.exe
          - goarch: arm64
            artifact: acopy-windows-arm64.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-android.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  release:
    needs: [build-linux-amd64, build-darwin, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/acopy-linux-amd64/acopy-linux-amd64 release/
          cp artifacts/acopy-darwin-amd64/acopy-darwin-amd64 release/
          cp artifacts/acopy-darwin-arm64/acopy-darwin-arm64 release/
          cp artifacts/acopy-windows-amd64.exe/acopy-windows-amd64.exe release/
          cp artifacts/acopy-windows-arm64.exe/acopy-windows-arm64.exe release/
          cp artifacts/acopy-android.apk/app-release.apk release/acopy-android.apk
          cd release && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

      - name: Upload Linux arm64 source note
        if: always()
        run: |
          echo "Linux arm64 build requires cross-compilation setup. See CONTRIBUTING.md for build instructions."
