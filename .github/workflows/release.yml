name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    container: alpine:edge
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: apk add --no-cache go gcc musl-dev
      - name: Build (static)
        env:
          CGO_ENABLED: "1"
          GOFLAGS: "-buildvcs=false"
        run: go build -trimpath -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME} -linkmode external -extldflags '-static'" -o acopy-linux-amd64 ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-linux-amd64
          path: acopy-linux-amd64

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOARCH: arm64
        run: go build -trimpath -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o acopy-darwin-arm64 ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-darwin-arm64
          path: acopy-darwin-arm64

  build-darwin-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o acopy-darwin-amd64 ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-darwin-amd64
          path: acopy-darwin-amd64

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o acopy-windows-amd64.exe ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-windows-amd64.exe
          path: acopy-windows-amd64.exe

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOARCH: arm64
        run: go build -trimpath -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o acopy-windows-arm64.exe ./cmd/acopy
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-windows-arm64.exe
          path: acopy-windows-arm64.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore
      - name: Build APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PAPP_VERSION=${GITHUB_REF_NAME}
      - uses: actions/upload-artifact@v4
        with:
          name: acopy-android.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  release:
    needs: [build-linux-amd64, build-darwin-arm64, build-darwin-amd64, build-windows-amd64, build-windows-arm64, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/acopy-linux-amd64/acopy-linux-amd64 release/
          cp artifacts/acopy-darwin-amd64/acopy-darwin-amd64 release/
          cp artifacts/acopy-darwin-arm64/acopy-darwin-arm64 release/
          cp artifacts/acopy-windows-amd64.exe/acopy-windows-amd64.exe release/
          cp artifacts/acopy-windows-arm64.exe/acopy-windows-arm64.exe release/
          cp artifacts/acopy-android.apk/app-release.apk release/acopy-android.apk
          cd release && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

      - name: Upload Linux arm64 source note
        if: always()
        run: |
          echo "Linux arm64 build requires cross-compilation setup. See CONTRIBUTING.md for build instructions."
